# ADAMAS — local-first staging deployment.
# The vault is a host-mounted volume; nothing leaves the machine.
services:
  adamas:
    build: .
    image: adamas:latest
    container_name: adamas
    ports:
      # Map only the single app port. No other inbound ports are exposed.
      - "8787:8787"
    environment:
      ADAMAS_HOST: 0.0.0.0
      ADAMAS_PORT: "8787"
      ADAMAS_VAULT: /data/vault
      # Seed the 14-decision sample ledger on first boot only (empty vault).
      # Set to "0" to boot to an empty vault (0 decisions).
      ADAMAS_SEED: "0"
      # Optional simple auth for a shared LAN staging instance.
      ADAMAS_BASIC_USER: "${ADAMAS_BASIC_USER:-adamas}"
      ADAMAS_BASIC_PASS: "${ADAMAS_BASIC_PASS:-clarity-audit}"
      # Hermes (local evaluation). Default is the built-in heuristic; set
      # ADAMAS_HERMES_PROVIDER=ollama (e.g. in a .env file) to use a local
      # Ollama model running on the host.
      ADAMAS_HERMES_PROVIDER: "${ADAMAS_HERMES_PROVIDER:-local}"
      ADAMAS_OLLAMA_URL: "${ADAMAS_OLLAMA_URL:-http://host.docker.internal:11434}"
      ADAMAS_OLLAMA_MODEL: "${ADAMAS_OLLAMA_MODEL:-llama3.1}"
      # Read-only connectors: the local-folder connector reads source material
      # from here. Drop notes/.eml files into ./sources on the host.
      ADAMAS_SOURCES_DIR: /data/sources
      # Generated Obsidian data-room vault (host folder ./obsidian → open in Obsidian).
      ADAMAS_OBSIDIAN_DIR: /data/obsidian
      # Auto-refresh the Obsidian vault on every change (default on). Set "0" to
      # only rebuild when you click Generate in the Data Room tab.
      ADAMAS_OBSIDIAN_AUTO: "${ADAMAS_OBSIDIAN_AUTO:-1}"
      # Optional read-only email connector (set these in a .env file to enable).
      ADAMAS_IMAP_HOST: "${ADAMAS_IMAP_HOST:-}"
      ADAMAS_IMAP_USER: "${ADAMAS_IMAP_USER:-}"
      ADAMAS_IMAP_PASS: "${ADAMAS_IMAP_PASS:-}"
      ADAMAS_IMAP_MAILBOX: "${ADAMAS_IMAP_MAILBOX:-INBOX}"
      ADAMAS_IMAP_MAX: "${ADAMAS_IMAP_MAX:-25}"
      # Optional read-only Google Calendar (iCal feed) connector.
      ADAMAS_ICS_URL: "${ADAMAS_ICS_URL:-}"
      ADAMAS_ICS_NAME: "${ADAMAS_ICS_NAME:-Calendar}"
      # Auto-pull connectors every N minutes so the inbox fills itself (0 = off).
      ADAMAS_CONNECTOR_PULL_MINUTES: "${ADAMAS_CONNECTOR_PULL_MINUTES:-0}"
      # On-device speech-to-text for dropped recordings. Defaults to the baked-in
      # whisper.cpp engine; override to point at a different local engine.
      ADAMAS_TRANSCRIBE_CMD: "${ADAMAS_TRANSCRIBE_CMD:-adamas-transcribe {input}}"
    # Let the container reach an Ollama server running on the host machine.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - adamas-vault:/data/vault
      # Host folder ADAMAS reads source material from (read-only mount).
      - ./sources:/data/sources:ro
      # Host folder ADAMAS writes the generated Obsidian vault into (open in Obsidian).
      - ./obsidian:/data/obsidian
    restart: unless-stopped

volumes:
  adamas-vault:
